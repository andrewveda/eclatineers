<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"> 
    <title>Eclatineers | SRM Valliammai Engineering College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        // Apply saved theme/font-scale immediately to avoid a flash of the wrong theme
        (function () {
            try {
                var theme = localStorage.getItem('eclatineers-theme') === 'dark' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                var scale = parseFloat(localStorage.getItem('eclatineers-font-scale'));
                if (scale && !isNaN(scale)) {
                    document.documentElement.style.setProperty('--reader-font-scale', scale);
                }
            } catch (e) {}
        })();
    </script>
<base target="_blank">
</head>
<body class="guilloche-bg">

    <!-- Persistent top bar: the wordmark always doubles as the Home button -->
    <nav class="nav-bar show" id="navBar">
        <a class="nav-brand" href="?" aria-label="Eclatineers — Home">Eclatineers</a>
        <div class="nav-context" id="navContext"><span class="nav-context-inner"></span></div>
        <button id="navMenuBtn" class="nav-menu-btn" aria-label="Menu">☰</button>
    </nav>

    <main id="app"></main>

    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close">✕</button>
        <ul class="mobile-menu-list" id="mobileMenuList"></ul>
    </div>

    <div class="loader-screen" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">E C L A T I N E E R S</div>
    </div>

    <div class="error-screen" id="errorScreen">
        <p id="errorMsg">Could not load magazine layout context.</p>
        <button class="retry-btn" onclick="window.location.reload()">Retry</button>
    </div>

    <!-- Persistent floating control docks. Always the same style as the theme toggle.
         Reader-only controls (font size, comments) reveal themselves only on article pages. -->
    <div class="floating-dock dock-left">
        <button class="dock-btn" id="themeToggleBtn" aria-label="Toggle dark/light theme">☾</button>
        <button class="dock-btn reader-only-btn" id="fontToggleBtn" aria-label="Text size controls">Aa</button>
        <div class="font-control-group" id="fontControlGroup">
            <button class="dock-btn font-btn" id="fontMinusBtn" onclick="adjustReaderFontSize(-1)" aria-label="Decrease text size">A−</button>
            <button class="dock-btn font-btn" id="fontPlusBtn" onclick="adjustReaderFontSize(1)" aria-label="Increase text size">A+</button>
        </div>
    </div>

    <div class="floating-dock dock-right">
        <button class="dock-btn reader-only-btn" id="commentsToggleBtn" aria-label="Open reviews and thoughts">💬</button>
        <button class="dock-btn back-to-top" id="backToTop" aria-label="Back to Top">↑</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
