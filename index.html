<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Eclatineers | SRM Valliammai Engineering College</title>
    
    <!-- Fonts Preconnect Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Modular Stylesheet Hook -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fixed Header Navigation Context Bar -->
    <nav class="nav-bar" id="navBar">
        <a id="navBack" class="nav-back-btn" href="#">‹</a>
        <div id="navTitle" class="nav-title">Eclatineers</div>
        <button id="navMenuBtn" class="nav-menu-btn" aria-label="Menu">☰</button>
    </nav>

    <!-- Core Dynamic DOM Application Entry Target Mount -->
    <main id="app"></main>

    <!-- Sideout Structural Mobile Drawer Content Layer -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close">✕</button>
        <ul class="mobile-menu-list" id="mobileMenuList"></ul>
    </div>

    <!-- Initialization Database Sheet Loading Curtain Screen -->
    <div class="loader-screen" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Magazine Data...</div>
    </div>

    <!-- Error Handling Fallback Interface Layer Viewport -->
    <div class="error-screen" id="errorScreen">
        <p id="errorMsg">Could not load magazine layout context.</p>
        <button class="retry-btn" onclick="window.location.reload()">Retry</button>
    </div>

    <!-- Scroll Anchoring Smooth Behavior Execution Trigger Component -->
    <button class="back-to-top" id="backToTop" aria-label="Back to Top">↑</button>

    <!-- Application Engine Logic Controllers Execution Thread -->
    <script src="app.js"></script>
</body>
</html>
